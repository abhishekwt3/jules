<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero Directions — Neo-Brutalist Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  :root {
    --paper: #fdf6e3;
    --yellow: #ffde00;
    --pink: #ff5277;
    --ink: #111111;
    --disp: "Archivo", system-ui, sans-serif;
    --mono: "Space Mono", monospace;
    --body: "Space Grotesk", system-ui, sans-serif;
  }
  html, body { margin: 0; }

  /* ---- shared hero primitives ---- */
  .hero { position: relative; width: 100%; height: 100%; overflow: hidden; font-family: var(--body); color: var(--ink); }
  .border3 { border: 3px solid var(--ink); }
  .hardshadow { box-shadow: 8px 8px 0 var(--ink); }
  .nav { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 22px 40px; border-bottom: 3px solid var(--ink); }
  .nav .brand { font-family: var(--mono); font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }
  .nav .links { display: flex; gap: 10px; }
  .pill { font-family: var(--mono); font-size: 13px; font-weight: 700; padding: 8px 16px; border: 3px solid var(--ink); background: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
  .tag { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .dot { width: 10px; height: 10px; background: var(--pink); border: 2px solid var(--ink); border-radius: 50%; }

  /* ============ A · BLOCK PRESS ============ */
  .a { background: var(--paper); display: grid; grid-template-rows: auto 1fr auto; }
  .a-main { display: grid; grid-template-columns: 1.5fr 1fr; gap: 0; }
  .a-left { padding: 56px 40px; display: flex; flex-direction: column; justify-content: center; gap: 26px; }
  .a-h1 { font-family: var(--disp); font-weight: 900; font-size: 112px; line-height: 0.88; letter-spacing: -3px; margin: 0; text-transform: uppercase; }
  .a-h1 .hl { background: var(--yellow); padding: 0 8px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
  .a-sub { font-size: 20px; max-width: 30ch; line-height: 1.4; font-weight: 500; }
  .a-cta { display: flex; gap: 14px; align-items: center; }
  .a-btn { font-family: var(--mono); font-weight: 700; font-size: 15px; padding: 14px 26px; background: var(--pink); color: #fff; border: 3px solid var(--ink); box-shadow: 6px 6px 0 var(--ink); text-transform: uppercase; }
  .a-btn.ghost { background: #fff; color: var(--ink); box-shadow: none; }
  .a-right { border-left: 3px solid var(--ink); background: var(--yellow); padding: 44px 36px; display: flex; flex-direction: column; gap: 22px; justify-content: center; }
  .a-stat { background: #fff; border: 3px solid var(--ink); box-shadow: 6px 6px 0 var(--ink); padding: 18px 20px; }
  .a-stat .num { font-family: var(--disp); font-weight: 900; font-size: 46px; line-height: 1; }
  .a-stat .lab { font-family: var(--mono); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
  .marquee { border-top: 3px solid var(--ink); background: var(--ink); color: var(--paper); overflow: hidden; white-space: nowrap; }
  .marquee .track { display: inline-block; padding: 12px 0; font-family: var(--mono); font-weight: 700; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; animation: scrollx 18s linear infinite; }
  .marquee .track span { padding: 0 22px; }
  .marquee .track span b { color: var(--yellow); }
  @keyframes scrollx { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ============ B · STICKER SHOP ============ */
  .b { background: var(--pink); display: grid; grid-template-rows: auto 1fr; position: relative; }
  .b .nav { border-bottom-color: var(--ink); }
  .b .nav .pill { background: var(--paper); }
  .b-stage { position: relative; display: flex; flex-direction: column; justify-content: center; padding: 30px 40px 56px; }
  .b-kicker { font-family: var(--mono); font-weight: 700; font-size: 15px; text-transform: uppercase; letter-spacing: 2px; background: var(--ink); color: var(--paper); align-self: flex-start; padding: 8px 14px; margin-bottom: 14px; }
  .b-h1 { font-family: var(--disp); font-weight: 900; font-size: 168px; line-height: 0.8; letter-spacing: -6px; margin: 0; text-transform: uppercase; color: var(--paper); }
  .b-h1 .out { color: transparent; -webkit-text-stroke: 4px var(--ink); }
  .b-h1 .yel { color: var(--yellow); -webkit-text-stroke: 4px var(--ink); }
  .b-sub { margin-top: 26px; font-size: 21px; font-weight: 600; max-width: 34ch; line-height: 1.35; background: var(--paper); border: 3px solid var(--ink); padding: 14px 18px; box-shadow: 7px 7px 0 var(--ink); align-self: flex-start; }
  .badge { position: absolute; font-family: var(--mono); font-weight: 700; text-transform: uppercase; border: 3px solid var(--ink); padding: 12px 16px; box-shadow: 5px 5px 0 var(--ink); font-size: 14px; }
  .b-badge1 { top: 40px; right: 60px; background: var(--yellow); transform: rotate(8deg); }
  .b-badge2 { bottom: 130px; right: 90px; background: var(--paper); transform: rotate(-7deg); font-size: 17px; }
  .b-badge3 { top: 200px; right: 280px; background: #fff; width: 74px; height: 74px; border-radius: 50%; display: grid; place-items: center; text-align: center; transform: rotate(12deg); box-shadow: 4px 4px 0 var(--ink); }

  /* ============ C · DEV TERMINAL ============ */
  .c { background: var(--paper); display: grid; grid-template-rows: auto 1fr; }
  .c .nav { background: var(--paper); }
  .c-stage { display: grid; grid-template-columns: 1fr 1.15fr; gap: 40px; padding: 48px 40px; align-items: center; }
  .c-copy { display: flex; flex-direction: column; gap: 22px; }
  .c-h1 { font-family: var(--disp); font-weight: 800; font-size: 76px; line-height: 0.92; letter-spacing: -2px; margin: 0; text-transform: uppercase; }
  .c-h1 em { font-style: normal; background: var(--pink); color: #fff; padding: 0 6px; }
  .c-sub { font-size: 19px; line-height: 1.45; max-width: 34ch; font-weight: 500; }
  .c-meta { display: flex; flex-wrap: wrap; gap: 8px; }
  .c-chip { font-family: var(--mono); font-size: 12px; font-weight: 700; padding: 7px 12px; border: 3px solid var(--ink); background: #fff; text-transform: uppercase; }
  .term { border: 3px solid var(--ink); background: #1b1b1b; box-shadow: 10px 10px 0 var(--ink); overflow: hidden; }
  .term-bar { display: flex; align-items: center; gap: 8px; background: var(--yellow); border-bottom: 3px solid var(--ink); padding: 10px 14px; }
  .term-bar .tl { width: 14px; height: 14px; border: 2px solid var(--ink); border-radius: 50%; }
  .term-bar .tl.r { background: var(--pink); } .term-bar .tl.y { background: #fff; } .term-bar .tl.g { background: var(--ink); }
  .term-bar .ttl { font-family: var(--mono); font-weight: 700; font-size: 13px; margin-left: 8px; }
  .term-body { padding: 22px; font-family: var(--mono); font-size: 15px; line-height: 1.7; color: #e8e8e8; }
  .term-body .pr { color: var(--yellow); }
  .term-body .cm { color: #7a7a7a; }
  .term-body .st { color: var(--pink); }
  .term-body .gr { color: #6ee87a; }
  .cursor { display: inline-block; width: 9px; height: 18px; background: var(--yellow); vertical-align: -3px; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* focus overlay tidy */
  .cap { font-family: var(--mono); }
</style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<div id="root"></div>
<script type="text/babel">
const { createRoot } = ReactDOM;

function HeroA() {
  return (
    <div className="hero a">
      <div className="nav">
        <div className="brand">JULES.TANAKA( )</div>
        <div className="links">
          <div className="pill">Work</div>
          <div className="pill">About</div>
          <div className="pill" style={{background:'var(--yellow)'}}>Contact</div>
        </div>
      </div>
      <div className="a-main">
        <div className="a-left">
          <div className="tag"><span className="dot"></span>Software Engineer · Available Q3</div>
          <h1 className="a-h1">I build <span className="hl">fast</span> things for the web.</h1>
          <p className="a-sub">Full-stack engineer shipping interfaces, infra, and the occasional weird side project.</p>
          <div className="a-cta">
            <div className="a-btn">See the work →</div>
            <div className="a-btn ghost">Resume</div>
          </div>

        <div className="a-right">
          <div className="a-stat"><div className="num">8 yrs</div><div className="lab">Shipping production</div></div>

          <div className="a-stat"><div className="num">∞</div><div className="lab">Cups of coffee</div></div>
        </div>
      </div>
      <div className="marquee"><div className="track">
        <span>TypeScript <b>✦</b></span><span>Rust <b>✦</b></span><span>Go <b>✦</b></span><span>React <b>✦</b></span><span>Postgres <b>✦</b></span><span>Kubernetes <b>✦</b></span>
        <span>TypeScript <b>✦</b></span><span>Rust <b>✦</b></span><span>Go <b>✦</b></span><span>React <b>✦</b></span><span>Postgres <b>✦</b></span><span>Kubernetes <b>✦</b></span>
      </div></div>
    </div>
  );
}

function HeroB() {
  return (
    <div className="hero b">
      <div className="nav">
        <div className="brand">JULES.TANAKA( )</div>
        <div className="links">
          <div className="pill">Work</div>
          <div className="pill">About</div>
          <div className="pill" style={{background:'var(--yellow)'}}>Contact</div>

      </div>
      <div className="b-stage">
        <div className="b-kicker">★ Software Engineer / Builder</div>
        <h1 className="b-h1"><span className="out">MAKE</span><br/>IT <span className="yel">WORK.</span></h1>
        <p className="b-sub">Then make it fast, make it clean, and make it look effortless. Full-stack engineer for hire.</p>

        <div className="badge b-badge2">⚡ ships daily</div>
        <div className="badge b-badge3">EST.<br/>2017</div>
      </div>
    </div>

function HeroC() {
  return (
    <div className="hero c">
      <div className="nav">
        <div className="brand">JULES.TANAKA( )</div>
        <div className="links">
          <div className="pill">Work</div>
          <div className="pill">About</div>
          <div className="pill" style={{background:'var(--yellow)'}}>Contact</div>
        </div>
      </div>
      <div className="c-stage">
        <div className="c-copy">
          <div className="tag"><span className="dot"></span>Hello_world.exe</div>
          <h1 className="c-h1">Engineer who <em>actually</em> ships.</h1>
          <p className="c-sub">I design and build full-stack systems — from the database to the pixel. Currently obsessed with developer tools.</p>
          <div className="c-meta">
            <div className="c-chip">TypeScript</div>
            <div className="c-chip">Rust</div>
            <div className="c-chip">Distributed Systems</div>
            <div className="c-chip">DX</div>
          </div>
        </div>
        <div className="term">
          <div className="term-bar"><span className="tl r"></span><span className="tl y"></span><span className="tl g"></span><span className="ttl">~/jules/whoami.sh</span></div>
          <div className="term-body">
            <div><span className="cm"># run the intro</span></div>
            <div><span className="pr">$</span> ./whoami --short</div>
            <div><span className="st">name</span>: Jules Tanaka</div>

            <div><span className="pr">$</span> <span className="cursor"></span></div>
          </div>
        </div>
      </div>
    </div>

function App() {
  return (
    <DesignCanvas>
      <DCSection id="heroes" title="Hero Directions" subtitle="Same warm neo-brutalist system, three personalities. Pick one (or mix) and I'll build the full multi-page site.">
        <DCArtboard id="a" label="A · Block Press — structured & confident" width={1360} height={840}><HeroA /></DCArtboard>
        <DCArtboard id="b" label="B · Sticker Shop — loud & playful" width={1360} height={840}><HeroB /></DCArtboard>
        <DCArtboard id="c" label="C · Dev Terminal — leans into the code" width={1360} height={840}><HeroC /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
